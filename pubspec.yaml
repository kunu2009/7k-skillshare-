name: skillswap
description: A peer-to-peer skill exchange platform where people trade knowledge instead of money.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.2
  go_router: ^13.0.0
  provider: ^6.1.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  cloud_firestore: ^4.13.0
  google_sign_in: ^6.1.0

  # State Management & Storage
  get_storage: ^2.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.3.1
  connectivity_plus: ^5.0.0

  # Date & Time
  intl: ^0.19.0

  # Image & Media
  image_picker: ^1.0.4
  permission_handler: ^11.0.0

  # UI Components
  flutter_slidable: ^3.0.0
  badges: ^3.1.1
  cached_network_image: ^3.3.0

  # Validation & Utilities
  uuid: ^4.0.0
  timeago: ^3.5.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Logging
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
