name: skillswap
description: A peer-to-peer skill exchange platform where people trade knowledge instead of money.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.2
  go_router: ^13.0.0
  provider: ^6.1.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  firebase_database: ^10.4.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.8.0

  # Real-time Communication
  agora_rtc_engine: ^6.3.0
  agora_rtm_engine: ^1.5.11

  # State Management & Storage
  get_storage: ^2.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.3.1
  connectivity_plus: ^5.0.0

  # Date & Time
  intl: ^0.19.0

  # Image & Media
  image_picker: ^1.0.4
  permission_handler: ^11.4.3
  file_picker: ^6.0.0

  # UI Components
  flutter_slidable: ^3.0.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  rive: ^0.13.0
  badges: ^3.1.1
  cached_network_image: ^3.3.0

  # Validation & Utilities
  validator: ^4.2.1
  uuid: ^4.0.0
  timeago: ^3.5.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Logging
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/translations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
